version: '3.8'

services:
  db:
    image: postgres:13
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    networks:
      - foodgram-network

  backend:
    build: ../backend
    env_file: .env
    depends_on:
      - db
    command: >
      sh -c "
      python wait-for-db.py &&
      python manage.py migrate --noinput &&
      python manage.py collectstatic --noinput &&
      echo '✅ Статика Django собрана' &&
      cp -r /app/backend/static/. /collected_static/ &&
      echo '🖼️ Копируем изображения рецептов...' &&
      mkdir -p /app/media/recipes &&
      cp -n /app/backend/media/recipes/* /app/media/recipes/ 2>/dev/null || true &&
      echo '✅ Изображения скопированы (если были)' &&
      python manage.py fill_db ||
      echo '❗ fill_db уже выполнен' &&
      gunicorn foodgram.wsgi:application --bind 0.0.0.0:8000 --log-level debug --access-logfile - --error-logfile -
      "
    volumes:
      - ../data:/app/data
      - ../backend:/app/backend
      - static_value:/app/backend/static/
      - ./static:/collected_static
      - media_value:/app/media/
    expose:
      - 8000
    networks:
      - foodgram-network

  frontend:
    image: node:16-alpine
    working_dir: /app
    volumes:
      - ../frontend:/app
      - ../infra:/app/infra
    command: >
      sh -c "
      echo '📦 Устанавливаем зависимости...' &&
      npm install --legacy-peer-deps &&
      echo '🏗️ Собираем проект...' &&
      CI=false npm run build --legacy-peer-deps &&
      echo '✅ Сборка завершена!' &&
      echo '🔍 Проверяем содержимое build:' &&
      ls -la build/ &&
      echo '🔍 Проверяем содержимое build/static:' &&
      ls -la build/static/ &&
      echo '🚚 Копируем статику React в ./static (без вложенности)...' &&
      mkdir -p /app/infra/static &&
      cp -r build/static/. /app/infra/static/ &&
      echo '✅ Статика React скопирована в /var/html/static/' &&
      echo '📄 Копируем index.html в ./build...' &&
      mkdir -p /app/infra/build &&
      cp -r build/* /app/infra/build/ &&
      echo '✅ Файлы фронтенда в /var/html'
      "
    networks:
      - foodgram-network
    restart: "no"

  nginx:
    image: nginx:1.25.4-alpine
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./static:/var/html/static
      - ./build:/var/html
      - media_value:/var/html/media/
    networks:
      - foodgram-network

volumes:
  postgres_data:
  static_value:
  media_value:

networks:
  foodgram-network:
    driver: bridge