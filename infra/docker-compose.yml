version: '3.8'

services:
  db:
    image: postgres:13
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    networks:
      - foodgram-network

  backend:
    build: ../backend
    env_file: .env
    depends_on:
      - db
    command: >
      sh -c "
      python wait-for-db.py &&
      python manage.py migrate --noinput &&
      python manage.py fill_db ||
      echo '❗ fill_db уже выполнен' &&
      gunicorn foodgram.wsgi:application --bind 0.0.0.0:8000 --log-level debug --access-logfile - --error-logfile -
      "
    volumes:
      - ../data:/app/data
      - static_value:/app/static/
      - media_value:/app/media/
    expose:
      - 8000
    networks:
      - foodgram-network

  frontend:
    image: node:16-alpine
    working_dir: /app
    volumes:
      - ../frontend:/app
      - static_value:/var/html
    command: >
      sh -c "
      echo '📦 Устанавливаем зависимости...' &&
      npm install --legacy-peer-deps &&
      echo '🏗️ Собираем проект...' &&
      CI=false npm run build --legacy-peer-deps &&
      echo '🔍 Проверяем папку build:' &&
      ls -la build/ &&
      echo '🚚 Копируем сборку в /var/html...' &&
      cp -r build/* /var/html/ &&
      echo '✅ Готово! Файлы в /var/html'
      "
    networks:
      - foodgram-network
    restart: "no"

  nginx:
    image: nginx:1.25.4-alpine
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - static_value:/var/html
      - media_value:/var/html/media/
    networks:
      - foodgram-network

volumes:
  postgres_data:
  static_value:
  media_value:

networks:
  foodgram-network:
    driver: bridge