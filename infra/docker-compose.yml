version: '3.8'

services:
  db:
    image: postgres:13
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    networks:
      - foodgram-network

  backend:
    build: ../backend
    env_file: .env
    depends_on:
      - db
    volumes:
      - ../data:/app/data
      - static_value:/app/static/
      - media_value:/app/media/
    expose:
      - 8000
    networks:
      - foodgram-network

  frontend:
    image: node:16-alpine
    working_dir: /app
    volumes:
      - ../frontend:/app
      - static_value:/app/dist
    command: >
      sh -c "
      echo '📁 Текущая директория: $(pwd)'
      && ls -la
      && echo '📦 Устанавливаем зависимости...'
      && npm install --legacy-peer-deps
      && echo '🏗️ Собираем проект...'
      && CI=false npm run build --legacy-peer-deps
      && echo '🔍 Проверяем папку build:'
      && ls -la build/
      && echo '🚚 Копируем в volume...'
      && cp -r build/* /app/dist/
      && echo '✅ Готово! Файлы скопированы в /app/dist'
      "
    networks:
      - foodgram-network
    restart: "no"

  nginx:
    image: nginx:1.25.4-alpine
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - static_value:/var/html/static/
      - media_value:/var/html/media/
    networks:
      - foodgram-network

volumes:
  postgres_data:
  static_value:
  media_value:

networks:
  foodgram-network:
    driver: bridge