version: '3.8'

services:
  db:
    image: postgres:13-alpine
    restart: always
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    networks:
      - foodgram-network

  backend:
    build: ../backend
    env_file: .env
    depends_on:
      - db
    volumes:
      - static_value:/app/static/
      - media_value:/app/media/
    expose:
      - 8000
    networks:
      - foodgram-network

  frontend:
    container_name: foodgram-front
    build: ../frontend
    volumes:
      - ../frontend/:/app/result_build/
    networks:
      - foodgram-network

  nginx:
    container_name: foodgram-proxy
    image: nginx:1.25.4-alpine
    ports:
      - "80:80"
    depends_on:
      - backend
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - static_value:/var/html/static/
      - media_value:/var/html/media/
    networks:
      - foodgram-network

volumes:
  postgres_data:
  static_value:
  media_value:

networks:
  foodgram-network:
    driver: bridge