services:
  db:
    image: postgres:13-alpine
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    networks:
      - foodgram-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend-1
    env_file: .env
    depends_on:
      - db
    command: >
      sh -c "
      echo '🔧 Делаем скрипт исполняемым...' &&
      chmod +x /copy-static.sh ||
      echo '❗ /copy-static.sh отсутствует — пропускаем' &&
      echo '⏳ Ожидаем подключения к БД...' &&
      python wait-for-db.py &&
      echo '✅ База данных готова' &&
      python manage.py migrate --noinput &&
      python manage.py collectstatic --noinput &&
      echo '✅ Статика Django собрана' &&
      cp -r /app/static/* /collected_static/ 2>/dev/null || true &&
      echo '✅ Статика скопирована в volume' &&
      python manage.py fill_db ||
      echo '❗ fill_db уже выполнен' &&
      echo '🚀 Запускаем Gunicorn...' &&
      gunicorn foodgram.wsgi:application --bind 0.0.0.0:8000 --log-level info --access-logfile - --error-logfile -
      "
    volumes:
      - static_value:/collected_static
      - ./copy-static.sh:/copy-static.sh
      - ./data:/app/data
      - ./data/media:/app/media
    expose:
      - "8000"
    restart: always
    networks:
      - foodgram-network

  frontend:
    image: node:16-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - ./static_build:/var/html/build
      - ./static:/var/html/static
      - static_value:/shared_static
    command: >
      sh -c "
      echo '📦 Устанавливаем зависимости...' &&
      npm install --legacy-peer-deps &&
      echo '🏗️ Собираем проект...' &&
      CI=false npm run build --legacy-peer-deps &&
      echo '🚚 Копируем ВЕСЬ build/ в /var/html/build...' &&
      mkdir -p /var/html/build &&
      cp -r build/. /var/html/build/ &&
      echo '🚚 Копируем JS/CSS в /shared_static для /static/...' &&
      mkdir -p /shared_static/js /shared_static/css &&
      cp -r build/static/js/*.js /shared_static/js/ 2>/dev/null || true &&
      cp -r build/static/css/*.css /shared_static/css/ 2>/dev/null || true &&
      echo '✅ Готово' &&
      sleep infinity
      "
    restart: "no"
    networks:
      - foodgram-network

  nginx:
    image: nginx:1.25.4-alpine
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - static_value:/var/html/static
      - ./data/media:/var/html/media
      - ./static_build:/var/html/build
    restart: always
    networks:
      - foodgram-network

volumes:
  postgres_data:
  static_value:

networks:
  foodgram-network:
    driver: bridge
