version: '3.8'

volumes:
  pg_data:
  static:
  media:

services:
  db:
    image: postgres:13-alpine
    env_file: .env
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: always

  backend:
    image: mikhailbigbear/foodgram-backend:latest
    env_file: .env
    volumes:
      - static:/app/static/
      - media:/app/media/
    depends_on:
      - db
    expose:
      - 8000
    restart: always

  collectstatic:
    image: mikhailbigbear/foodgram-backend:latest
    env_file: .env
    volumes:
      - static:/app/static/
    command: python manage.py collectstatic --noinput
    depends_on:
      - backend
    restart: "no"

  nginx:
    image: nginx:1.25.4-alpine
    ports:
      - "80:80"
    volumes:
      - static:/var/html/static/
      - media:/var/html/media/
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - collectstatic
    restart: always